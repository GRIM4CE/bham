version: 1
applications:
  - appRoot: apps/portfolio
    frontend:
      phases:
        preBuild:
          commands:
            - nvm install 20
            - npm install -g npm@10.2.4
            - node -v && npm -v
            - cd ../../ && npm ci
        build:
          commands:
            - cd ../../ && npx turbo run build --filter=@bham/portfolio
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
      cache:
        paths:
          - ../../node_modules/**/*
          - ../../.turbo/**/*
  - appRoot: apps/storybook
    frontend:
      phases:
        preBuild:
          commands:
            - nvm install 20
            - npm install -g npm@10.2.4
            - node -v && npm -v
            - cd ../../ && npm ci
        build:
          commands:
            - cd ../../ && npx turbo run build --filter=@bham/storybook
      artifacts:
        baseDirectory: storybook-static
        files:
          - '**/*'
      cache:
        paths:
          - ../../node_modules/**/*
          - ../../.turbo/**/*
