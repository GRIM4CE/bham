version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 18
        - cd ../../ && npm ci
    build:
      commands:
        - cd ../../ && npx turbo run build --filter=@bham/portfolio
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - ../../node_modules/**/*
