version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 20
        - npm install -g npm@10.2.4
        - node -v && npm -v
        - cd "$CODEBUILD_SRC_DIR" && npm ci
    build:
      commands:
        - cd "$CODEBUILD_SRC_DIR" && npx turbo run build --filter=@bham/portfolio
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - ../../node_modules/**/*
      - ../../.turbo/**/*
