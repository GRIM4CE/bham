version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 18
        - node -v && npm -v
        - cd ../../ && npm ci
    build:
      commands:
        - cd ../../ && npx turbo run build --filter=@bham/storybook
  artifacts:
    baseDirectory: storybook-static
    files:
      - '**/*'
  cache:
    paths:
      - ../../node_modules/**/*
